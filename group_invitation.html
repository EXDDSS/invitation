<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Attendees List</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1f2a44;
  font-family: 'Pretendard', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.container {
  width: 900px;
  background: rgba(255,255,255,0.05);
  padding: 50px;
  border-radius: 10px;
}

/* 제목 */
.title {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  margin-bottom: 40px;
}

/* 테이블 */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding: 12px 10px;
  text-align: left;
  font-size: 14px;
}

th {
  font-weight: 600;
  opacity: 0.8;
}

tr:hover {
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="container">

<div class="title">Attendees List</div>

<table id="table"></table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const snapshot = await getDocs(collection(db, "responses"));

let rows = [];
let extraFields = new Set();

snapshot.forEach(doc => {
  const data = doc.data();
  rows.push(data);

  Object.keys(data).forEach(k => {
    if (!["이름","나이","신장","체중","국적","invitationId"].includes(k)) {
      extraFields.add(k);
    }
  });
});

// 헤더 순서 고정
const baseHeaders = ["이름","나이","신장","체중","국적"];
const headers = [...baseHeaders, ...extraFields, "Invitation_Code"];

const table = document.getElementById("table");

// 헤더 생성
let headerRow = "<tr>";
headers.forEach(h => headerRow += `<th>${h}</th>`);
headerRow += "</tr>";

table.innerHTML += headerRow;

// 데이터 생성
rows.forEach(r => {
  let row = "<tr>";

  headers.forEach(h => {
    if (h === "Invitation_Code") {
      row += `<td>${r.invitationId || ""}</td>`;
    } else {
      row += `<td>${r[h] || ""}</td>`;
    }
  });

  row += "</tr>";
  table.innerHTML += row;
});
</script>

</body>
</html>
