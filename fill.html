<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pretendard:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1f2a44;
  font-family: 'Pretendard', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.container {
  width: 700px;
  background: rgba(255,255,255,0.05);
  padding: 50px;
  border-radius: 10px;
}

.title {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  margin-bottom: 40px;
}

textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 30px 0;
}

.field {
  display: flex;
  align-items: center;
}

.label {
  width: 80px;
}

.input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.4);
}

input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
}

.unit {
  margin-left: 6px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">Invitation</div>

<textarea id="intro" readonly></textarea>

<div class="grid" id="fields"></div>

<textarea id="outro" readonly></textarea>

<button onclick="submitData()">제출</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

const snap = await getDoc(doc(db, "invitations", id));
const data = snap.data();

document.getElementById("intro").value = data.intro;
document.getElementById("outro").value = data.outro;

const container = document.getElementById("fields");

data.fields.forEach(f => {
  const div = document.createElement("div");
  div.className = "field";

  let unit = "";
  if (f === "신장") unit = "cm";
  if (f === "체중") unit = "kg";

  div.innerHTML = `
    <div class="label">${f} :</div>
    <div class="input-wrap">
      <input name="${f}" type="${unit ? "number" : "text"}">
      ${unit ? `<span class="unit">${unit}</span>` : ""}
    </div>
  `;

  container.appendChild(div);
});

window.submitData = async function() {
  const inputs = document.querySelectorAll("input");
  let result = {};

  inputs.forEach(i => result[i.name] = i.value);

  await addDoc(collection(db, "responses"), {
    invitationId: id,
    ...result
  });

  alert("제출 완료");
};
</script>

</body>
</html>
