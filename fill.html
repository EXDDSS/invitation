<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Invitation</title>
</head>

<body>

<h2 id="intro"></h2>

<form id="form"></form>

<button onclick="submitData()">저장</button>

<p id="outro"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
  storageBucket: "exddss-invitation.firebasestorage.app",
  messagingSenderId: "246756776070",
  appId: "1:246756776070:web:ce3c16791d303bb5bdd907"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

const snap = await getDoc(doc(db, "invitations", id));
const data = snap.data();

document.getElementById("intro").innerText = data.intro;
document.getElementById("outro").innerText = data.outro;

const form = document.getElementById("form");

data.fields.forEach(f => {
  const div = document.createElement("div");
  div.innerHTML = `<label>${f}</label><input name="${f}">`;
  form.appendChild(div);
});

window.submitData = async function() {
  const inputs = form.querySelectorAll("input");
  let result = {};

  inputs.forEach(i => result[i.name] = i.value);

  await addDoc(collection(db, "responses"), {
    invitationId: id,
    ...result
  });

  alert("저장 완료!");
};
</script>

</body>
</html>
