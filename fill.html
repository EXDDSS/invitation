<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1f2a44;
  font-family: 'Pretendard', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.container {
  width: 700px;
  background: rgba(255,255,255,0.05);
  padding: 50px;
  border-radius: 10px;
}

.title {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  margin-bottom: 40px;
}

/* textarea 자동 확장 */
textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: white;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.8;
  padding: 10px 0;
  resize: none;
  overflow: hidden;
}

/* 2열 */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 40px 0;
}

.field {
  display: flex;
  align-items: center;
}

.label {
  width: 80px;
  font-weight: 600;
}

.input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.4);
}

input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  font-weight: 600;
  font-size: 14px;
}

.unit {
  margin-left: 6px;
  opacity: 0.7;
}

/* 버튼 */
.buttons {
  text-align: center;
  margin-top: 40px;
}

button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.5);
  color: white;
  padding: 10px 18px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="container">

<div class="title">Invitation</div>

<textarea id="intro" rows="1" readonly></textarea>

<div class="grid" id="fields"></div>

<textarea id="outro" rows="1" readonly></textarea>

<div class="buttons">
  <button onclick="submitData()">발송</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// textarea 자동 확장
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

// 데이터 불러오기
const id = new URLSearchParams(location.search).get("id");

const snap = await getDoc(doc(db, "invitations", id));
const data = snap.data();

// 상단 / 하단
const introEl = document.getElementById("intro");
const outroEl = document.getElementById("outro");

introEl.value = data.intro;
outroEl.value = data.outro;

autoResize(introEl);
autoResize(outroEl);

// 필드 생성
const container = document.getElementById("fields");

data.fields.forEach(f => {
  const div = document.createElement("div");
  div.className = "field";

  let unit = "";
  if (f === "신장") unit = "cm";
  if (f === "체중") unit = "kg";

  div.innerHTML = `
    <div class="label">${f} :</div>
    <div class="input-wrap">
      <input name="${f}" type="${unit ? "number" : "text"}">
      ${unit ? `<span class="unit">${unit}</span>` : ""}
    </div>
  `;

  container.appendChild(div);
});

// 제출 (발송)
window.submitData = async function() {
  const inputs = document.querySelectorAll("input");
  let result = {};

  inputs.forEach(i => result[i.name] = i.value);

  await addDoc(collection(db, "responses"), {
    invitationId: id,
    ...result
  });

  alert("발송 완료");
};
</script>

</body>
</html>
