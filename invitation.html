<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pretendard:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1f2a44;
  font-family: 'Pretendard', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.container {
  width: 700px;
  background: rgba(255,255,255,0.05);
  padding: 50px;
  border-radius: 10px;
  position: relative;
}

.title {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  margin-bottom: 40px;
}

/* 텍스트 */
textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 10px 0;
  resize: none;
}

/* 2열 */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 30px 0;
}

.field {
  display: flex;
  align-items: center;
}

.label {
  width: 80px;
}

/* 밑줄 통합 */
.input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.4);
}

.input-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
}

.unit {
  margin-left: 6px;
  opacity: 0.7;
}

/* 버튼 */
.buttons {
  text-align: center;
  margin-top: 30px;
}

button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.5);
  color: white;
  padding: 10px 18px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.1);
}

.link-box {
  margin-top: 20px;
  font-size: 13px;
}

/* 이미지 업로드 */
.upload-box {
  position: absolute;
  top: 20px;
  right: 20px;
}

/* 이미지 에디터 */
#imageEditor {
  position: absolute;
  display: none;
  cursor: move;
}

#imageEditor img {
  width: 200px;
}

.resize {
  width: 12px;
  height: 12px;
  background: white;
  position: absolute;
  right: 0;
  bottom: 0;
  cursor: se-resize;
}
</style>
</head>

<body>

<div class="container">

<div class="title">Invitation</div>

<!-- 업로드 -->
<div class="upload-box">
  <input type="file" id="imageInput">
</div>

<!-- 이미지 -->
<div id="imageEditor">
  <img id="preview">
  <div class="resize"></div>
</div>

<textarea id="intro" rows="3"></textarea>

<div class="grid" id="fields">

  <div class="field">
    <div class="label">이름 :</div>
    <div class="input-wrap"><input></div>
  </div>

  <div class="field">
    <div class="label">나이 :</div>
    <div class="input-wrap"><input type="number"></div>
  </div>

  <div class="field">
    <div class="label">신장 :</div>
    <div class="input-wrap">
      <input type="number">
      <span class="unit">cm</span>
    </div>
  </div>

  <div class="field">
    <div class="label">체중 :</div>
    <div class="input-wrap">
      <input type="number">
      <span class="unit">kg</span>
    </div>
  </div>

  <div class="field">
    <div class="label">국적 :</div>
    <div class="input-wrap"><input></div>
  </div>

</div>

<button onclick="addField()">+ 항목 추가</button>

<textarea id="outro" rows="3"></textarea>

<div class="buttons">
  <button onclick="generateLink()">저장 & 링크 생성</button>
  <button onclick="copyLink()">복사</button>
</div>

<div id="linkBox" class="link-box"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 이미지 상태
let imageData = "";
let pos = { x: 150, y: 150 };
let size = 200;

const editor = document.getElementById("imageEditor");
const img = document.getElementById("preview");

// 업로드
imageInput.addEventListener("change", e => {
  const reader = new FileReader();
  reader.onload = () => {
    imageData = reader.result;
    img.src = imageData;
    editor.style.display = "block";
    editor.style.left = pos.x + "px";
    editor.style.top = pos.y + "px";
  };
  reader.readAsDataURL(e.target.files[0]);
});

// 드래그
let drag = false;

editor.addEventListener("mousedown", () => drag = true);

document.addEventListener("mousemove", e => {
  if (!drag) return;
  pos.x = e.clientX - size/2;
  pos.y = e.clientY - size/2;
  editor.style.left = pos.x + "px";
  editor.style.top = pos.y + "px";
});

document.addEventListener("mouseup", () => drag = false);

// 리사이즈
let resize = false;

document.querySelector(".resize").addEventListener("mousedown", e => {
  e.stopPropagation();
  resize = true;
});

document.addEventListener("mousemove", e => {
  if (!resize) return;
  size = e.clientX - pos.x;
  img.style.width = size + "px";
});

document.addEventListener("mouseup", () => resize = false);

// 항목 추가
window.addField = function() {
  const div = document.createElement("div");
  div.className = "field";
  div.innerHTML = `
    <div class="label">항목 :</div>
    <div class="input-wrap"><input></div>
  `;
  document.getElementById("fields").appendChild(div);
};

// 저장
window.generateLink = async function() {
  const intro = document.getElementById("intro").value;
  const outro = document.getElementById("outro").value;

  const docRef = await addDoc(collection(db, "invitations"), {
    intro,
    outro,
    image: imageData,
    pos,
    size
  });

  const link = `${location.origin}/fill.html?id=${docRef.id}`;
  linkBox.innerText = link;
};

// 복사
window.copyLink = function() {
  navigator.clipboard.writeText(linkBox.innerText);
  alert("복사 완료");
};
</script>

</body>
</html>
