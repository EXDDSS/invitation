<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<!-- 필기체 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pretendard:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1f2a44;
  font-family: 'Pretendard', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

/* 카드 */
.container {
  width: 700px;
  background: rgba(255,255,255,0.05);
  padding: 50px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
}

/* 타이틀 */
.title {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  margin-bottom: 40px;
}

/* 이미지 */
.image-box {
  text-align: center;
  margin-bottom: 30px;
}

.image-box img {
  max-width: 100%;
  border-radius: 8px;
}

/* 텍스트 */
textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 10px 0;
  resize: none;
}

/* 2열 그리드 */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 30px 0;
}

/* 필드 */
.field {
  display: flex;
  align-items: center;
  justify-content: center;
}

.label {
  width: 80px;
}

.input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
}

input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: white;
}

.unit {
  margin-left: 5px;
  opacity: 0.7;
}

/* 버튼 */
.buttons {
  text-align: center;
  margin-top: 30px;
}

button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.5);
  color: white;
  padding: 10px 18px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.1);
}

.link-box {
  margin-top: 20px;
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<div class="title">Invitation</div>

<!-- 이미지 업로드 -->
<div class="image-box">
  <input type="file" id="imageInput">
  <br><br>
  <img id="preview" />
</div>

<!-- 인사말 -->
<textarea id="intro" rows="3" placeholder=" "></textarea>

<!-- 2열 필드 -->
<div class="grid" id="fields">

  <div class="field">
    <div class="label">이름 :</div>
    <div class="input-wrap"><input></div>
  </div>

  <div class="field">
    <div class="label">나이 :</div>
    <div class="input-wrap"><input type="number"></div>
  </div>

  <div class="field">
    <div class="label">신장 :</div>
    <div class="input-wrap">
      <input type="number">
      <span class="unit">cm</span>
    </div>
  </div>

  <div class="field">
    <div class="label">체중 :</div>
    <div class="input-wrap">
      <input type="number">
      <span class="unit">kg</span>
    </div>
  </div>

  <div class="field">
    <div class="label">국적 :</div>
    <div class="input-wrap"><input></div>
  </div>

</div>

<button onclick="addField()">+ 항목 추가</button>

<!-- 마무리 -->
<textarea id="outro" rows="3" placeholder=" "></textarea>

<div class="buttons">
  <button onclick="generateLink()">저장 & 링크 생성</button>
  <button onclick="copyLink()">복사</button>
</div>

<div id="linkBox" class="link-box"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 이미지 저장 (base64)
let imageData = "";

document.getElementById("imageInput").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    imageData = reader.result;
    document.getElementById("preview").src = imageData;
  };

  reader.readAsDataURL(file);
});

// 항목 추가
window.addField = function() {
  const div = document.createElement("div");
  div.className = "field";
  div.innerHTML = `
    <div class="label">항목 :</div>
    <div class="input-wrap">
      <input placeholder="">
    </div>
  `;
  document.getElementById("fields").appendChild(div);
};

// 링크 생성
window.generateLink = async function() {
  const intro = document.getElementById("intro").value;
  const outro = document.getElementById("outro").value;

  const inputs = document.querySelectorAll("#fields input");
  const fields = Array.from(inputs).map(i => i.previousElementSibling?.innerText || "항목");

  const docRef = await addDoc(collection(db, "invitations"), {
    intro,
    outro,
    fields,
    image: imageData
  });

  const link = `${location.origin}/fill.html?id=${docRef.id}`;
  document.getElementById("linkBox").innerText = link;
};

// 복사
window.copyLink = function() {
  navigator.clipboard.writeText(document.getElementById("linkBox").innerText);
  alert("복사 완료");
};
</script>

</body>
</html>
