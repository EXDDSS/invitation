<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pretendard:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1f2a44;
  font-family: 'Pretendard', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.container {
  width: 700px;
  background: rgba(255,255,255,0.05);
  padding: 50px;
  border-radius: 10px;
  position: relative;
}

.title {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  margin-bottom: 40px;
}

textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 10px 0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 30px 0;
}

.field {
  display: flex;
  align-items: center;
}

.label {
  width: 80px;
}

.input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.4);
}

.input-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
}

.unit {
  margin-left: 6px;
}

.buttons {
  text-align: center;
  margin-top: 30px;
}

button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.5);
  color: white;
  padding: 10px 18px;
  margin: 5px;
  cursor: pointer;
}

.upload-box {
  position: absolute;
  top: 20px;
  right: 20px;
}

#imageEditor {
  position: absolute;
  display: none;
  cursor: move;
}

#imageEditor img {
  width: 200px;
}

.resize {
  width: 12px;
  height: 12px;
  background: white;
  position: absolute;
  right: 0;
  bottom: 0;
  cursor: se-resize;
}
</style>
</head>

<body>

<div class="container">

<div class="title">Invitation</div>

<div class="upload-box">
  <input type="file" id="imageInput">
</div>

<div id="imageEditor">
  <img id="preview">
  <div class="resize"></div>
</div>

<textarea id="intro"></textarea>

<div class="grid" id="fields">

  <div class="field"><div class="label">이름 :</div><div class="input-wrap"><input></div></div>
  <div class="field"><div class="label">나이 :</div><div class="input-wrap"><input type="number"></div></div>
  <div class="field"><div class="label">신장 :</div><div class="input-wrap"><input type="number"><span class="unit">cm</span></div></div>
  <div class="field"><div class="label">체중 :</div><div class="input-wrap"><input type="number"><span class="unit">kg</span></div></div>
  <div class="field"><div class="label">국적 :</div><div class="input-wrap"><input></div></div>

</div>

<button onclick="addField()">+ 항목 추가</button>

<textarea id="outro"></textarea>

<div class="buttons">
  <button onclick="saveInvitation()">저장</button>
  <button onclick="createLink()">링크 생성</button>
  <button onclick="copyLink()">복사</button>
</div>

<div id="linkBox"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let savedId = null;

// 저장
window.saveInvitation = async function() {
  const intro = document.getElementById("intro").value;
  const outro = document.getElementById("outro").value;

  const fields = [];
  document.querySelectorAll(".field").forEach(f => {
    const label = f.querySelector(".label").innerText.replace(":", "").trim();
    fields.push(label);
  });

  const docRef = await addDoc(collection(db, "invitations"), {
    intro,
    outro,
    fields
  });

  savedId = docRef.id;
  alert("저장 완료");
};

// 링크 생성
window.createLink = function() {
  if (!savedId) return alert("먼저 저장하세요");

  const basePath = location.pathname.substring(0, location.pathname.lastIndexOf("/") + 1);
  const link = `${location.origin}${basePath}fill.html?id=${savedId}`;

  document.getElementById("linkBox").innerText = link;
};

// 복사
window.copyLink = function() {
  const text = document.getElementById("linkBox").innerText;
  if (!text) return alert("먼저 링크 생성");

  navigator.clipboard.writeText(text);
  alert("복사 완료");
};
</script>

</body>
</html>
