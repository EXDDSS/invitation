<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Invitation Creator</title>

<style>
body {
  font-family: 'Georgia';
  background: linear-gradient(#fdf6e3, #f5e6ca);
  padding: 40px;
}
.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
}
input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}
.field {
  display: flex;
}
button {
  margin-top: 10px;
}
.link-box {
  background: #eee;
  padding: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>
<div class="container">

<h2>💌 초대장 만들기</h2>

<textarea id="intro" placeholder="인사말 입력"></textarea>

<div id="fields">
  <div class="field"><input value="이름"></div>
  <div class="field"><input value="나이"></div>
  <div class="field"><input value="국적"></div>
  <div class="field"><input value="키"></div>
  <div class="field"><input value="몸무게"></div>
</div>

<button onclick="addField()">+ 항목 추가</button>

<textarea id="outro" placeholder="마무리 메시지"></textarea>

<button onclick="generateLink()">링크 생성</button>
<button onclick="copyLink()">복사</button>

<div id="linkBox" class="link-box"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
  storageBucket: "exddss-invitation.firebasestorage.app",
  messagingSenderId: "246756776070",
  appId: "1:246756776070:web:ce3c16791d303bb5bdd907"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addField = function() {
  const div = document.createElement("div");
  div.className = "field";
  div.innerHTML = `<input placeholder="항목명">`;
  document.getElementById("fields").appendChild(div);
};

window.generateLink = async function() {
  const intro = document.getElementById("intro").value;
  const outro = document.getElementById("outro").value;

  const inputs = document.querySelectorAll("#fields input");
  const fields = Array.from(inputs).map(i => i.value);

  const docRef = await addDoc(collection(db, "invitations"), {
    intro,
    outro,
    fields
  });

  const link = `${location.origin}/fill.html?id=${docRef.id}`;
  document.getElementById("linkBox").innerText = link;
};

window.copyLink = function() {
  const text = document.getElementById("linkBox").innerText;
  navigator.clipboard.writeText(text);
  alert("복사 완료!");
};
</script>

</body>
</html>
