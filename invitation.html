<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1f2a44;
  font-family: 'Pretendard', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.container {
  width: 700px;
  background: rgba(255,255,255,0.05);
  padding: 50px;
  border-radius: 10px;
}

.title {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  margin-bottom: 40px;
}

textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: white;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.8;
  padding: 10px 0;
  resize: none;
  overflow: hidden;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 40px 0;
}

.field {
  display: flex;
  align-items: center;
}

.label {
  width: 80px;
  font-weight: 600;
}

.input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.4);
}

.input-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  font-weight: 600;
  font-size: 14px;
}

.unit {
  margin-left: 6px;
  opacity: 0.7;
}

.delete-btn {
  margin-left: 10px;
  cursor: pointer;
  opacity: 0.6;
}

.delete-btn:hover {
  opacity: 1;
  color: #ff6b6b;
}

.buttons {
  text-align: center;
  margin-top: 40px;
}

button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.5);
  color: white;
  padding: 10px 18px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.1);
}

.link-box {
  margin-top: 20px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">Invitation</div>

<textarea id="intro" rows="1" placeholder=" "></textarea>

<div class="grid" id="fields"></div>

<button onclick="addField()">+ 항목 추가</button>

<textarea id="outro" rows="1" placeholder=" "></textarea>

<div class="buttons">
  <button onclick="saveInvitation()">저장</button>
  <button onclick="createLink()">링크 생성</button>
  <button onclick="copyLink()">복사</button>
</div>

<div id="linkBox" class="link-box"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9tGXzd2hYTLtoqMTkvhEwTCsLzLSZFug",
  authDomain: "exddss-invitation.firebaseapp.com",
  projectId: "exddss-invitation",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let savedId = null;

// textarea 자동 확장
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

document.querySelectorAll("textarea").forEach(t => {
  t.addEventListener("input", () => autoResize(t));
});

// 🔥 기본 필드 생성 함수
function createField({label, type="text", value="", unit=null}) {
  const div = document.createElement("div");
  div.className = "field";

  div.innerHTML = `
    <div class="label">${label} :</div>
    <div class="input-wrap">
      <input type="${type}" value="${value}">
      ${unit ? `<span class="unit">${unit}</span>` : ""}
      <span class="delete-btn" onclick="deleteField(this)">✕</span>
    </div>
  `;
  return div;
}

// 🔥 기본 구조 세팅
function setDefaultFields() {
  const container = document.getElementById("fields");
  container.innerHTML = "";

  container.appendChild(createField({label:"이름"}));
  container.appendChild(createField({label:"나이", type:"number"}));
  container.appendChild(createField({label:"신장", type:"number", unit:"cm"}));
  container.appendChild(createField({label:"체중", type:"number", unit:"kg"}));
  container.appendChild(createField({label:"국적"}));
  container.appendChild(createField({label:"PL", type:"number", unit:"cm"}));
}

// 🔥 로드 시 복원
window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("invitationData");

  if (!saved) {
    setDefaultFields();
    return;
  }

  const data = JSON.parse(saved);

  document.getElementById("intro").value = data.intro || "";
  document.getElementById("outro").value = data.outro || "";

  const container = document.getElementById("fields");
  container.innerHTML = "";

  data.fields.forEach(f => {
    container.appendChild(createField(f));
  });

  document.querySelectorAll("textarea").forEach(t => autoResize(t));
});

// 🔥 삭제
window.deleteField = function(el) {
  el.closest(".field").remove();
  autoSave();
};

// 🔥 항목 추가 (팝업)
window.addField = function() {
  const name = prompt("항목명을 입력해주세요.");
  if (!name) return;

  const container = document.getElementById("fields");
  container.appendChild(createField({label:name}));

  autoSave();
};

// 🔥 자동 저장
function autoSave() {
  const intro = document.getElementById("intro").value;
  const outro = document.getElementById("outro").value;

  const fields = [];

  document.querySelectorAll(".field").forEach(f => {
    const label = f.querySelector(".label").innerText.replace(":", "").trim();
    const input = f.querySelector("input");
    const unitEl = f.querySelector(".unit");

    fields.push({
      label,
      value: input.value,
      type: input.type,
      unit: unitEl ? unitEl.innerText : null
    });
  });

  localStorage.setItem("invitationData", JSON.stringify({
    intro,
    outro,
    fields
  }));
}

// 🔥 저장 버튼
window.saveInvitation = async function() {
  autoSave();

  const data = JSON.parse(localStorage.getItem("invitationData"));

  const docRef = await addDoc(collection(db, "invitations"), {
    intro: data.intro,
    outro: data.outro,
    fields: data.fields.map(f => f.label)
  });

  savedId = docRef.id;

  alert("저장 완료");
};

// 링크 생성
window.createLink = function() {
  if (!savedId) return alert("먼저 저장하세요");

  const basePath = location.pathname.substring(0, location.pathname.lastIndexOf("/") + 1);
  const link = `${location.origin}${basePath}fill.html?id=${savedId}`;

  document.getElementById("linkBox").innerText = link;
};

// 복사
window.copyLink = function() {
  const text = document.getElementById("linkBox").innerText;
  if (!text) return alert("먼저 링크 생성");

  navigator.clipboard.writeText(text);
  alert("복사 완료");
};
</script>

</body>
</html>
